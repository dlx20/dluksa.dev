availableSecrets:
  secretManager:
    - versionName: projects/ddev-499313/secrets/NEXT_PUBLIC_GOOGLE_MAPS_API_KEY/versions/latest
      env: 'MAPS_KEY'
    - versionName: projects/ddev-499313/secrets/NEXT_PUBLIC_APP_URL/versions/latest
      env: 'APP_URL'

steps:
  # Build the image (BuildKit enabled for --mount=type=cache support)
  - name: 'gcr.io/cloud-builders/docker'
    id: Build
    entrypoint: 'bash'
    env:
      - 'DOCKER_BUILDKIT=1'
    args:
      - '-c'
      - |
        docker build \
          --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="$$MAPS_KEY" \
          --build-arg NEXT_PUBLIC_APP_URL="$$APP_URL" \
          -t europe-west1-docker.pkg.dev/ddev-499313/cloud-run-source-deploy/dluksa.dev/dluksa-dev:$COMMIT_SHA \
          -t europe-west1-docker.pkg.dev/ddev-499313/cloud-run-source-deploy/dluksa.dev/dluksa-dev:latest \
          .
    secretEnv: ['MAPS_KEY', 'APP_URL']

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    id: Push
    args:
      - 'push'
      - '--all-tags'
      - 'europe-west1-docker.pkg.dev/ddev-499313/cloud-run-source-deploy/dluksa.dev/dluksa-dev'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: Deploy
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dluksa-dev'
      - '--image=europe-west1-docker.pkg.dev/ddev-499313/cloud-run-source-deploy/dluksa.dev/dluksa-dev:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--port=3000'
      - '--set-secrets=EMAIL_USER=EMAIL_USER:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,GOOGLE_REFRESH_TOKEN=GOOGLE_REFRESH_TOKEN:latest,NEXT_PUBLIC_APP_URL=NEXT_PUBLIC_APP_URL:latest,NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:latest'

images:
  - 'europe-west1-docker.pkg.dev/ddev-499313/cloud-run-source-deploy/dluksa.dev/dluksa-dev:$COMMIT_SHA'
  - 'europe-west1-docker.pkg.dev/ddev-499313/cloud-run-source-deploy/dluksa.dev/dluksa-dev:latest'

options:
  logging: CLOUD_LOGGING_ONLY