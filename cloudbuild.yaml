steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    dir: 'ddev'
    args:
      - '-c'
      - |
        docker build \
          -t gcr.io/$PROJECT_ID/ddev \
          -f Dockerfile \
          --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY="$$MAPS_KEY" \
          .
    secretEnv: ['MAPS_KEY']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/NEXT_PUBLIC_GOOGLE_MAPS_API_KEY/versions/latest
      env: 'MAPS_KEY'