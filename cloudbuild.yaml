steps:
  - name: "gcr.io/cloud-builders/docker"
    entrypoint: "bash"
    secretEnv:
      - GOOGLE_MAPS_API_KEY
    args:
      - "-c"
      - |
        docker build \
          --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=$$GOOGLE_MAPS_API_KEY \
          -t ${_IMAGE} .

images:
  - "${_IMAGE}"

substitutions:
  _IMAGE: "us-central1-docker.pkg.dev/$PROJECT_ID/nextjs/app"

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/google-maps-api-key/versions/latest
      env: GOOGLE_MAPS_API_KEY